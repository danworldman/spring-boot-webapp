# --- Database Connection ---
# Uses Environment Variables for Docker/Production, falls back to localhost for development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/webapp_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pass}

# --- Server Configuration ---
# Custom port for the application
server.port=${SERVER_PORT:8081}

# --- Hibernate & Flyway ---
# Disable automatic DDL generation to rely on Flyway migrations (best practice for Prod)
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Logging & Debugging ---
# Hide SQL in console for better performance, but keep formatting ready for debugging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Standard logging level for production-ready service
logging.level.root=info

# --- Virtual Threads ---
# Enable Project Loom (Virtual Threads) for high-concurrency request handling
spring.threads.virtual.enabled=true

# --- Documentation & Web API ---
# Expose Spring Actuator endpoints in Swagger UI for monitoring
springdoc.show-actuator=true
# Start pagination from index 0
spring.data.web.pageable.one-indexed-parameters=false

# --- Redis ---
# Use Redis as the primary caching provider
spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=6379
# Set Cache Time-To-Live (TTL) to 10 minutes to prevent stale data
spring.cache.redis.time-to-live=600000

# --- Spring Boot Actuator ---
# Expose essential endpoints for health checks and metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Show detailed status for database and Redis in health check
management.endpoint.health.show-details=always

# --- Graceful Shutdown ---
# Enable smooth application shutdown to finish active requests
server.shutdown=graceful
# Give virtual threads 20 seconds to complete tasks before exit
spring.lifecycle.timeout-per-shutdown-phase=20s

# --- Monitoring & Metrics ---
# Enable metrics export in Prometheus format for Grafana dashboards
spring.metrics.export.prometheus.enabled=true
# Add global 'application' tag to all metrics for easier filtering in Grafana
management.metrics.tags.application=${spring.application.name:spring-webapp}